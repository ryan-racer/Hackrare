# Render Blueprint — deploy from repo root
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: hackrare-db
    databaseName: hackrare
    plan: free  # use starter for production

services:
  - type: web
    runtime: node
    name: hackrare
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hackrare-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
      # Auth0 — set in Render Dashboard (see README)
      - key: AUTH0_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false  # Your Render service URL, e.g. https://hackrare.onrender.com
      - key: AUTH0_DOMAIN
        sync: false  # e.g. your-tenant.us.auth0.com
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      # Optional
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: CRON_SECRET
      #   generateValue: true
      # NextAuth (only if using credentials/register)
      # - key: NEXTAUTH_URL
      #   sync: false
      # - key: NEXTAUTH_SECRET
      #   generateValue: true
