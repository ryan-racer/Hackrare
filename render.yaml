# Render Blueprint: deploy from repo root
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: hackrare-db
    databaseName: hackrare
    plan: free  # or starter for production

services:
  - type: web
    runtime: node
    name: hackrare
    # Migrations run during build (Pre-Deploy is paid-only on free tier)
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hackrare-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false  # Set in Dashboard to your service URL, e.g. https://hackrare.onrender.com
      - key: NODE_VERSION
        value: "20"
    # Optional: add if you use these features
    # - key: OPENAI_API_KEY
    #   sync: false
    # - key: CRON_SECRET
    #   generateValue: true
